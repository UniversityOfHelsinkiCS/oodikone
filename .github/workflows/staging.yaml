name: 'Test and release to staging'

on:
  push:
    branches:
      - master
    paths:
      - '.github/actions/**'
      - '.github/workflows/staging.yaml'
      - '.github/workflows/test.yaml'
      - 'services/**'
      - 'updater/**'
      - 'docker-compose.ci.yml'
      - 'docker-compose.test.yml'
      - 'package*.json'
      - 'cypress/**'
      - 'cypress.config.json'

jobs:
  test:
    uses: UniversityOfHelsinkiCS/oodikone/.github/workflows/test.yaml@master
    secrets:
      username: ${{ secrets.TOSKAREGISTRY_USERNAME }}
      password: ${{ secrets.TOSKAREGISTRY_PASSWORD }}

  release_backend:
    name: 'Build and release backend'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: 'Build backend'
        id: build-image
        uses: ./.github/actions/build/backend
        with:
          environment: 'staging'
          release_version: ${{ github.sha }}

      - name: Push to quay.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: quay.io/toska
          username: toska+github
          password: ${{ secrets.QUAY_IO_TOKEN }}

  release_frontend:
    name: 'Build and release frontend'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: 'Build frontend'
        id: build-image
        uses: ./.github/actions/build/frontend
        with:
          environment: 'staging'
          release_version: ${{ github.sha }}

      - name: Push to quay.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: quay.io/toska
          username: toska+github
          password: ${{ secrets.QUAY_IO_TOKEN }}

  release_updater_worker:
    name: 'Build and release updater worker'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: 'Build worker'
        id: build-image
        uses: ./.github/actions/build/worker
        with:
          environment: 'staging'
          release_version: ${{ github.sha }}

      - name: Push to quay.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: quay.io/toska
          username: toska+github
          password: ${{ secrets.QUAY_IO_TOKEN }}

  release_updater_scheduler:
    name: 'Build and release updater scheduler'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: 'Build scheduler'
        id: build-image
        uses: ./.github/actions/build/scheduler
        with:
          environment: 'staging'
          release_version: ${{ github.sha }}

      - name: Push to quay.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: quay.io/toska
          username: toska+github
          password: ${{ secrets.QUAY_IO_TOKEN }}

  report_success:
    name: 'Report deployment success to the "oodikone_notifications" channel'
    runs-on: ubuntu-latest
    if: success()
    needs:
      - release_frontend
      - release_backend
      - release_updater_worker
      - release_updater_scheduler

    steps:
      - uses: actions/checkout@v7
      - name: 'Send notification to Slack'
        uses: UniversityOfHelsinkiCS/slackbot-action@v1.5
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          message-type: deployment
          softa-url: https://toska-staging.cs.helsinki.fi/oodikone
          deployment-target: staging

  report_failure:
    name: 'Report deployment failure to the "oodikone_notifications" channel'
    runs-on: ubuntu-latest
    if: failure()
    needs:
      - release_frontend
      - release_backend
      - release_updater_worker
      - release_updater_scheduler

    steps:
      - uses: actions/checkout@v7
      - name: 'Send notification to Slack'
        uses: UniversityOfHelsinkiCS/slackbot-action@v1.5
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          message-type: deployment-failure
          deployment-target: staging
