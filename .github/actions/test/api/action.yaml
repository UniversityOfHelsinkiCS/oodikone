name: 'Run api tests'
description: 'Runs api tests in backend'

inputs:
  username:
    required: true
    description: 'Toska registry username'
  password:
    required: true
    description: 'Toska registry password'

runs:
  using: composite
  steps:
    - name: Install node-24
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Login to toska docker registry
      uses: docker/login-action@v4
      with:
        registry: registry-toska.ext.ocp-prod-0.k8s.it.helsinki.fi
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Start oodikone (without frontend and backend)
      shell: bash
      run: npm run oodikone:ci:setup -- --quiet-pull --wait

    - name: Install dependencies
      shell: bash
      run: npm ci --prefix ./services/backend

    - name: Run api-tests
      shell: bash
      run: npm run test:api --prefix ./services/backend
