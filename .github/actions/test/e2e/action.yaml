name: 'Run tests'
description: 'Runs Cypress tests for individual spec'

inputs:
  username:
    required: true
    description: 'Toska registry username'
  password:
    required: true
    description: 'Toska registry password'
  spec:
    required: true
    description: 'Path to Cypress file'
  test_name:
    required: true
    description: 'Name of the test'

runs:
  using: composite
  steps:
    - name: 'Login to toska Docker registry'
      uses: docker/login-action@v4
      with:
        registry: registry-toska.ext.ocp-prod-0.k8s.it.helsinki.fi
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: 'Run services, pull rest of the needed images'
      shell: bash
      run: docker compose --file docker-compose.ci.yml --profile oodikone up --detach --quiet-pull

    - name: Run Cypress inside docker container
      shell: bash
      run: |
        docker run -v $PWD:/e2e -w /e2e --add-host host.docker.internal:host-gateway -e CYPRESS_VIDEO -e CYPRESS_baseUrl=http://host.docker.internal:1337 --entrypoint cypress cypress/included:15.18.1 run --browser firefox --spec ${{ inputs.spec }}

    - name: 'Upload video if tests fail'
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: 'Cypress videos - ${{ inputs.test_name }}'
        path: ./cypress/videos/*
        retention-days: 7

    - name: 'Print logs on failure'
      shell: bash
      if: failure()
      run: npm run logs:ci && sleep 15
