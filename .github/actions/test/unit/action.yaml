name: 'Run unit tests'
description: 'Runs unit tests in backend and frontend'

runs:
  using: composite
  steps:
    - name: Install node-24
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: npm ci --prefix ./services/shared && npm ci --prefix ./services/backend && npm ci --prefix ./services/frontend

    - name: Run frontend unit tests
      run: npm run test:unit --prefix ./services/frontend

    - name: Run backend unit tests
      run: npm run test:unit --prefix ./services/backend
