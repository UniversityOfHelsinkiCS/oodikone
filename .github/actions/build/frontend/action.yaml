name: 'Build frontend'
description: 'Build frontend in staging or production versions'

inputs:
  environment:
    required: true
    description: 'staging or production'
    default: 'production'
  release_version:
    required: false
    description: 'Release version added to production builds'
    default: ${{ github.sha }}
  sentry_dns:
    required: false
    description: 'Sentry url to send error logs to (only production, enforced)'
    default: ''
  push:
    required: false
    description: Also push built image to toska registry
    default: false
  registry_password:
    required: false
    description: Password to quay.io registry
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to quay.io
      if: ${{ inputs.push }}
      uses: docker/login-action@v4
      with:
        registry: quay.io/toska
        username: toska+github
        password: ${{ inputs.registry_password }}

    - name: Get current time
      id: get_current_time
      shell: bash
      run: echo "NOW=$(date --iso-8601=seconds)" >> $GITHUB_OUTPUT

    - name: 'Build image and export it'
      id: build-image-action
      uses: docker/build-push-action@v7
      with:
        context: services
        file: services/frontend/Dockerfile
        build-args: |
          GIT_SHA=${{ github.sha }}
          STAGING=${{ case(inputs.environment == 'staging', 'true', 'false') }}
          BASE_PATH=${{ case(inputs.environment == 'staging', '/oodikone', '') }}
          SENTRY_ENVIRONMENT=${{ inputs.environment }}
          SENTRY_RELEASE=${{ inputs.release_version }}
          BUILT_AT=${{ steps.get_current_time.outputs.NOW }}
          SENTRY_DSN=${{ case(inputs.environment == 'production', inputs.sentry_dns, '') }}
        push: ${{ inputs.push }}
        tags: |
          ${{ inputs.environment }}
          ${{ github.sha }}
      env:
        DOCKER_BUILD_SUMMARY: false
